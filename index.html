<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pink Floyd — Listening Guides</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://unpkg.com/@fontsource/playfair-display@5.0.8/index.css">
  <style>
    :root {
      --serif: 'Playfair Display', Georgia, serif;
      --sans: system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; background: #000; }

    /* ── Stage ──────────────────────────────────── */
    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* ── Background lettering ───────────────────── */
    .bg-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--sans);
      font-size: clamp(72px, 13vw, 180px);
      font-weight: 900;
      letter-spacing: -.02em;
      color: rgba(255,255,255,.35);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }

    /* ── Hub ────────────────────────────────────── */
    .hub {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 2;
    }

    .hub-eye {
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255,255,255,.95);
      margin-bottom: 12px;
      font-family: var(--sans);
    }

    .hub-title {
      font-family: var(--serif);
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 400;
      font-style: italic;
      color: rgba(255,255,255,.9);
      margin-bottom: 10px;
    }

    .hub-sub {
      font-size: 10px;
      color: rgba(255,255,255,.45);
      font-family: var(--sans);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    /* ── Album circles ──────────────────────────── */
    .album {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      z-index: 10;
      transform: translate(-50%, -50%);
      transition: left 0.7s cubic-bezier(.4,0,.2,1), top 0.7s cubic-bezier(.4,0,.2,1);
    }

    .circle-wrap {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.45);
      transition: border-color .35s, box-shadow .35s;
      position: relative;
    }

    .circle-wrap svg {
      width: 140px;
      height: 140px;
      display: block;
      filter: brightness(1.6);
    }

    .explore-hint {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .3s;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.95);
    }

    .album.active:hover .circle-wrap {
      border-color: rgba(255,255,255,.75);
      box-shadow: 0 0 50px rgba(255,255,255,.12);
    }

    .album.active:hover .explore-hint { opacity: 1; }

    .album.soon .circle-wrap {
      opacity: .48;
    }

    .album-name {
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,.95);
      text-align: center;
      line-height: 1.4;
      max-width: 140px;
    }

    .album.soon .album-name { color: rgba(255,255,255,.35); }

    .album-meta {
      font-size: 10px;
      color: rgba(255,255,255,.45);
      font-family: var(--sans);
      letter-spacing: .1em;
      text-align: center;
    }

    .album.soon .album-meta { color: rgba(255,255,255,.35); }

    /* ── Positions (desktop) ────────────────────── */
    /* Pentagon layout — 5 albums × 72° apart, r ≈ 30%, centre 50%/50% */
    #meddle   { left: 50%;  top: 20%; }
    #dsotm    { left: 79%;  top: 41%; }
    #wywh     { left: 68%;  top: 74%; }
    #animals  { left: 32%;  top: 74%; }
    #division { left: 21%;  top: 41%; }

    /* ── View toggle button ─────────────────────── */
    .view-toggle {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: none;
      border: 0.5px solid rgba(255,255,255,.3);
      color: rgba(255,255,255,.55);
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: 9px 22px;
      border-radius: 100px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }
    .view-toggle:hover {
      border-color: rgba(255,255,255,.65);
      color: rgba(255,255,255,.88);
    }

    /* ── Chrono connecting line ──────────────────── */
    .chrono-line {
      position: absolute;
      top: 50%;
      left: 10%;
      width: 80%;
      height: 0.5px;
      background: rgba(255,255,255,.12);
      transform: translateY(-50%);
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
      pointer-events: none;
    }
    #stage.chrono .chrono-line { opacity: 1; }

    /* ── Float animations ───────────────────────── */
    @keyframes f1 { 0%,100%{translate:0 0}    50%{translate:0 -15px} }
    @keyframes f2 { 0%,100%{translate:0 -8px} 50%{translate:0  8px}  }
    @keyframes f3 { 0%,100%{translate:0 0}    50%{translate:0 -18px} }
    @keyframes f4 { 0%,100%{translate:0 -6px} 50%{translate:0  11px} }
    @keyframes f5 { 0%,100%{translate:0 0}    50%{translate:0 -13px} }
    @keyframes f6 { 0%,100%{translate:0 -10px}50%{translate:0  9px}  }

    #dsotm    { animation: f1 8s    ease-in-out infinite; }
    #wywh     { animation: f2 9.5s  ease-in-out 1.2s infinite; }
    #animals  { animation: f3 7s    ease-in-out 2.4s infinite; }
    #meddle   { animation: f5 8.5s  ease-in-out 3.2s infinite; }
    #division { animation: f6 9s    ease-in-out 1.8s infinite; }

    /* ── Mobile ─────────────────────────────────── */
    @media (max-width: 680px) {
      #stage {
        position: static;
        min-height: 100vh;
        overflow: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px 60px;
        gap: 0;
      }

      .bg-text { display: none; }

      .hub {
        position: static;
        transform: none;
        padding: 0 0 32px;
      }

      .album {
        position: static;
        transform: none;
        animation: none;
        margin: 0;
      }

      .mobile-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px 20px;
        width: 100%;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>

<!-- Chrono toggle -->
<script>
  const pentagon = {
    meddle:   { left: '50%', top: '20%' },
    dsotm:    { left: '79%', top: '41%' },
    wywh:     { left: '68%', top: '74%' },
    animals:  { left: '32%', top: '74%' },
    division: { left: '21%', top: '41%' },
  };

  // Chronological order: Meddle(1971) → DSOTM(1973) → WYWH(1975) → Animals(1977) → Division Bell(1994)
  const chrono = {
    meddle:   { left: '10%', top: '50%' },
    dsotm:    { left: '28%', top: '50%' },
    wywh:     { left: '50%', top: '50%' },
    animals:  { left: '72%', top: '50%' },
    division: { left: '90%', top: '50%' },
  };

  let ischrono = false;

  document.getElementById('viewToggle').addEventListener('click', function () {
    ischrono = !ischrono;
    const stage = document.getElementById('stage');
    const positions = ischrono ? chrono : pentagon;

    Object.entries(positions).forEach(([id, pos]) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.left = pos.left;
      el.style.top  = pos.top;
      if (ischrono) {
        el.style.animation = 'none';
        el.style.translate  = '0 0';
      } else {
        el.style.animation = '';
        el.style.translate  = '';
      }
    });

    stage.classList.toggle('chrono', ischrono);
    this.textContent = ischrono ? 'Randomise' : 'View chronologically';
  });
</script>

<!-- Mobile: reflow into grid -->
<script>
  function isMobile() { return window.innerWidth <= 680; }

  function buildMobileLayout() {
    if (!isMobile()) return;
    const stage = document.getElementById('stage');
    stage.style.cssText = 'position:static;min-height:100vh;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:44px 20px 60px;background:#000;';
    const hub = document.querySelector('.hub');
    hub.style.cssText = 'position:static;transform:none;padding:0 0 36px;text-align:center;';
    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:30px 18px;width:100%;max-width:380px;';
    const albums = document.querySelectorAll('.album');
    albums.forEach(a => {
      a.style.cssText = 'position:static;transform:none;animation:none;';
      grid.appendChild(a);
    });
    stage.appendChild(grid);
  }

  buildMobileLayout();
  window.addEventListener('resize', () => {
    if (isMobile()) buildMobileLayout();
  });
</script>

</body>
